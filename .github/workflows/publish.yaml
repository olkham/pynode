name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  # Manual runs must be dispatched from a tag ref (e.g. v0.3.0), otherwise
  # setuptools_scm produces a dev version that PyPI rejects.
  workflow_dispatch:

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # setuptools_scm derives the version from git tags, so it needs the
          # full history and the tags (a shallow checkout would break it).
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Trusted Publishing (OIDC) -- no API token stored in the repo. Configure a
    # trusted publisher for the `pynode-flow` project on PyPI pointing at this
    # workflow, and create a GitHub environment named `pypi`.
    environment:
      name: pypi
      url: https://pypi.org/p/pynode-flow
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
