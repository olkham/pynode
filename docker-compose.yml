services:
  pynode:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pynode
    ports:
      - "500:5000"
    volumes:
      # Mount persistent data
      - ./workflows:/app/workflows
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - HOST_IP=${HOST_IP:-}
    restart: unless-stopped
    # Rotate container logs so they cannot fill the host disk
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        # Memory limit is a safety cap; tune to your hardware/models.
        limits:
          memory: 8g
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
